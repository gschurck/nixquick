name: E2E

on:
  pull_request:
  push:

jobs:
  nixos-e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Run television action modes test
        run: nix-build ./tests -A television-action-modes --show-trace
